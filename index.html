<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecLAB Centralized Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 100%);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.8) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 16px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 20px 50px -10px rgba(59, 130, 246, 0.15);
            transform: translateY(-3px);
        }

        .nav-item {
            position: relative;
            overflow: hidden;
            background: transparent;
            font-weight: 500;
            letter-spacing: 0.025em;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #3b82f6;
            transform: scaleY(0);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: center;
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
        }

        .nav-item:hover {
            background: rgba(59, 130, 246, 0.05);
            color: white;
            padding-left: 1.25rem;
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, transparent 100%);
            color: #60a5fa;
            font-weight: 800;
        }

        .nav-item.active::before {
            transform: scaleY(0.7);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(51, 65, 85, 0.6);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.8);
        }

        /* Vibrant Text gradients */
        .text-gradient {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pulse-subtle {
            animation: pulse-border 3s infinite ease-in-out;
        }

        @keyframes pulse-border {
            0% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.2);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(59, 130, 246, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }
    </style>
</head>

<body class="h-screen flex text-sm">

    <!-- SIDEBAR -->
    <nav
        class="w-68 bg-black/40 backdrop-blur-xl border-r border-slate-800/50 flex flex-col p-6 z-10 shadow-2xl shadow-indigo-500/10">
        <div class="mb-10 px-2 flex items-center gap-3">
            <div
                class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20 pulse-subtle">
                <i data-lucide="shield-lightning" class="w-5 h-5 text-white"></i>
            </div>
            <div>
                <span class="font-black text-xl text-gradient tracking-tight block leading-tight">SecLAB</span>
                <span
                    class="text-[9px] font-bold text-slate-500 uppercase letter-spacing-wider tracking-widest block">AI
                    Core Engine</span>
            </div>
        </div>

        <div class="space-y-1.5 flex-1">
            <button onclick="router.go('dashboard')" id="btn-dashboard"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="layout-grid" class="w-4 h-4"></i> Command Center
            </button>
            <button onclick="router.go('vulnerabilities')" id="btn-vulnerabilities"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="scan-line" class="w-4 h-4"></i> Event Horizon (Vulns)
            </button>
            <button onclick="router.go('patch-lab')" id="btn-patch-lab"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="microscope" class="w-4 h-4"></i> Automation Lab
            </button>
            <button onclick="router.go('decision-tree')" id="btn-decision-tree"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="network" class="w-4 h-4"></i> Logic Flow matrix
            </button>
            <button onclick="router.go('system-core')" id="btn-system-core"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="satellite" class="w-4 h-4"></i> Engine Diagnostics
            </button>
            <button onclick="router.go('compliance')" id="btn-compliance"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="file-badge" class="w-4 h-4"></i> Ledger Audit
            </button>
            <button onclick="router.go('feedback')" id="btn-feedback"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="sparkles" class="w-4 h-4"></i> User Tuning
            </button>
            <div class="my-4 h-px bg-slate-800/50"></div>
            <button onclick="router.go('terminal')" id="btn-terminal"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="terminal-square" class="w-4 h-4"></i> Live Shell
            </button>
            <button onclick="router.go('website-scanner')" id="btn-website-scanner"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="radar" class="w-4 h-4"></i> Target Scanners
            </button>
        </div>
    </nav>

    <!-- CONTENT -->
    <main
        class="flex-1 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] relative flex flex-col items-stretch z-0">
        <div class="absolute inset-0 bg-slate-950/80 z-[-1]"></div>
        <div class="absolute inset-x-0 top-0 h-96 bg-gradient-to-b from-indigo-900/10 to-transparent z-[-1]"></div>
        <header
            class="h-20 border-b border-white/5 flex items-center justify-between px-10 bg-black/20 backdrop-blur-md">
            <h2 id="page-title" class="text-2xl font-black text-white flex items-center gap-3 tracking-tight">
                Dashboard
            </h2>
            <div class="flex items-center gap-6">
                <div
                    class="px-3 py-1.5 rounded-full bg-slate-800/50 border border-slate-700/50 flex items-center gap-2">
                    <span
                        class="block w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse"></span>
                    <span class="text-[10px] font-bold tracking-widest text-slate-300 uppercase">System Active</span>
                </div>
            </div>
        </header>

        <div id="viewport" class="p-8 overflow-y-auto flex-1">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script>
        // Dynamic API URL - works on both localhost and Render
        const API_URL = window.location.origin;

        const pipelineState = {
            scanId: null,
            vulnerabilities: [],
            metrics: {},
            systemCore: {},
            complianceData: {},
            feedbackData: {},
            terminalLogs: [],
            availableWebsites: [],
            currentScanId: 'default',
            scanStatus: 'COMPLETED',
            activeVulnId: null,

            async fetchAll() {
                try {
                    const [vulns, dash, comp, core, sites, pipe] = await Promise.all([
                        fetch(`${API_URL}/vulnerabilities`).then(r => r.json()),
                        fetch(`${API_URL}/dashboard`).then(r => r.json()),
                        fetch(`${API_URL}/compliance`).then(r => r.json()),
                        fetch(`${API_URL}/system-core`).then(r => r.json()),
                        fetch(`${API_URL}/available-websites`).then(r => r.json()),
                        fetch(`${API_URL}/pipeline/status`).then(r => r.json())
                    ]);
                    this.vulnerabilities = vulns;
                    this.metrics = dash;
                    this.complianceData = comp;
                    this.systemCore = core;
                    this.availableWebsites = sites.websites || [];
                    this.paused = pipe.paused;
                    this.activeJob = pipe.active;
                    this.queue = pipe.queue;

                    if (router.current !== 'terminal') app.render();
                } catch (e) { console.error("Sync Error", e); }
            },

            async fetchWebsites() {
                try {
                    const res = await fetch(`${API_URL}/available-websites`);
                    const data = await res.json();
                    this.availableWebsites = data.websites || [];
                    if (router.current === 'website-scanner') app.render();
                } catch (e) { console.error("Websites Fetch Error", e); }
            },

            async fetchTerminal() {
                try {
                    // Fetch both current scan logs AND pipeline automation logs
                    const [scanRes, pipeRes] = await Promise.all([
                        fetch(`${API_URL}/terminal-stream?session_id=${this.currentScanId}`),
                        fetch(`${API_URL}/terminal-stream?session_id=pipeline`)
                    ]);

                    const scanData = await scanRes.json();
                    const pipeData = await pipeRes.json();

                    // Combine or separate? Let's keep them separate but allow toggling
                    this.terminalLogs = scanData.logs || [];
                    this.pipelineLogs = pipeData.logs || [];

                    const oldStatus = this.scanStatus;
                    this.scanStatus = scanData.status || 'COMPLETED';

                    // Detect scan completion to show popup
                    if (oldStatus === 'RUNNING' && this.scanStatus === 'COMPLETED') {
                        app.showPipelinePopup();
                    }

                    if (router.current === 'terminal') app.render();
                } catch (e) { console.error("Terminal Sync Error", e); }
            },

            async startPipeline() {
                try {
                    await fetch(`${API_URL}/pipeline/start`, { method: 'POST' });
                    this.paused = false;
                    app.render();
                } catch (e) { console.error("Start Pipeline Failed", e); }
            },

            async scanWebsite(url) {
                console.log("[ACTION] Scan Website:", url);
                try {
                    const res = await fetch(`${API_URL}/scan-website`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    this.currentScanId = data.scan_id;
                    router.go('terminal');
                } catch (e) {
                    console.error("Web Scan Failed", e);
                    alert(`Web Scan Failed: ${e.message}`);
                }
            },

            async scanWebsite(url) {
                if (!url || !url.startsWith('http')) {
                    alert('Please enter a valid HTTP/HTTPS URL.');
                    return;
                }
                console.log("[ACTION] Custom Website Scan:", url);
                try {
                    const res = await fetch(`${API_URL}/scan-website`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    this.currentScanId = data.scan_id;
                    this.scanStatus = 'RUNNING';
                    router.go('terminal');
                    this.fetchTerminal();
                } catch (e) {
                    console.error("Custom Scan Failed", e);
                    alert(`Failed to start scan: ${e.message}`);
                }
            },

            async scanPredefinedWebsite(id) {
                console.log("[ACTION] Predefined Scan:", id);
                try {
                    const res = await fetch(`${API_URL}/initialize-audit/${id}`, { method: 'POST' });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    this.currentScanId = data.scan_id;
                    this.scanStatus = 'RUNNING';
                    router.go('terminal');
                    this.fetchTerminal();
                } catch (e) {
                    console.error("Predefined Scan Failed", e);
                    alert(`Failed to start scan: ${e.message}`);
                }
            },

            async executiveScan() {
                console.log("[ACTION] Executive Scan Started");
                try {
                    const res = await fetch(`${API_URL}/executive-scan`, { method: 'POST' });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    this.currentScanId = data.scan_id;
                    this.scanStatus = 'RUNNING';
                    alert("Executive Audit & Automated Remediation Pipeline Started!");
                    router.go('terminal');
                } catch (e) {
                    console.error("Executive Scan Failed", e);
                    alert(`Executive Scan Failed: ${e.message}`);
                }
            },

            async executeScan() {
                console.log("[ACTION] Execute Scan");
                try {
                    const res = await fetch(`${API_URL}/scan`, { method: 'POST' });
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    const data = await res.json();
                    this.currentScanId = data.scan_id;
                    router.go('terminal');
                } catch (e) {
                    console.error("Scan Failed:", e);
                    alert(`Scan failed: ${e.message}`);
                }
            },

            async generatePatch(id) {
                try {
                    await fetch(`${API_URL}/patch/${id}`, { method: 'POST' });
                    const vuln = this.vulnerabilities.find(v => v.id === id);
                    if (vuln) vuln.status = "PATCHED";
                    await this.fetchAll();
                    router.go('patch-lab');
                    this.activeVulnId = id;
                } catch (e) { console.error("Patch Failed", e); }
            },

            async validatePatch(id) {
                try {
                    await fetch(`${API_URL}/validate/${id}`, { method: 'POST' });
                    const vuln = this.vulnerabilities.find(v => v.id === id);
                    if (vuln) {
                        vuln.status = "VALIDATED";
                        vuln.risk_score = 0;
                    }
                    await this.fetchAll();
                    alert("Patch validated successfully!");
                    router.go('decision-tree');
                } catch (e) { console.error("Validation Failed", e); }
            }
        };

        const router = {
            current: 'dashboard',
            go(page) {
                this.current = page;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById(`btn-${page}`).classList.add('active');

                const titles = {
                    'dashboard': 'Security Dashboard',
                    'vulnerabilities': 'Vulnerability Registry',
                    'patch-lab': 'Remediation Laboratory',
                    'decision-tree': 'Decision Logic Visualization',
                    'system-core': 'Engine Diagnostics',
                    'compliance': 'Compliance Ledger',
                    'feedback': 'User Feedback Loop',
                    'terminal': 'Live System Terminal',
                    'website-scanner': 'Pre-connected Security Audit'
                };
                document.getElementById('page-title').innerText = titles[page];
                app.render();
            }
        };

        const app = {
            terminalMode: 'scan',
            init() {
                router.go('dashboard');
                // Ensure terminal looks clean on load by not triggering any automatic scan
                pipelineState.fetchWebsites();
                // Professional Sync: High-frequency polling for real-time feel
                setInterval(() => pipelineState.fetchAll(), 800);
                setInterval(() => pipelineState.fetchTerminal(), 800);
            },

            async executeScan() {
                document.getElementById('page-title').innerText = "Scanning filesystem...";
                await pipelineState.executeScan();
            },

            async generatePatch(id) {
                await pipelineState.generatePatch(id);
            },

            async validatePatch(id) {
                await pipelineState.validatePatch(id);
            },

            async submitFeedback(id) {
                const comment = prompt("Enter comments for this patch:");
                if (comment) {
                    await fetch(`${API_URL}/feedback/${id}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ rating: 5, comment: comment })
                    });
                    alert("Feedback Submitted!");
                    await pipelineState.fetchAll();
                }
            },

            render() {
                const viewport = document.getElementById('viewport');
                const page = router.current;
                lucide.createIcons();

                if (page === 'dashboard') this.renderDashboard(viewport);
                else if (page === 'vulnerabilities') this.renderVulns(viewport);
                else if (page === 'patch-lab') this.renderPatchLab(viewport);
                else if (page === 'decision-tree') this.renderTree(viewport);
                else if (page === 'system-core') this.renderSystem(viewport);
                else if (page === 'compliance') this.renderCompliance(viewport);
                else if (page === 'feedback') this.renderFeedback(viewport);
                else if (page === 'terminal') this.renderTerminal(viewport);
                else if (page === 'website-scanner') this.renderWebsiteScanner(viewport);

                this.renderGlobalOverlays();
            },

            showPipelinePopup() {
                const count = pipelineState.vulnerabilities.filter(v => v.status === 'DETECTED' || v.status === 'QUEUED_FOR_PATCH').length;
                if (count === 0) return;

                const overlay = document.createElement('div');
                overlay.id = 'pipeline-modal';
                overlay.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm px-6';
                overlay.innerHTML = `
                    <div class="glass max-w-lg w-full p-8 rounded-2xl border-blue-500/30 shadow-[0_0_50px_rgba(59,130,246,0.2)] text-center animate-in zoom-in duration-300">
                        <div class="w-20 h-20 bg-blue-600/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="shield-alert" class="w-10 h-10"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-2">Threat Detection Complete</h3>
                        <p class="text-slate-400 mb-8 font-mono text-sm">System has identified <span class="text-blue-400 font-bold">${count} vulnerabilities</span> requiring remediation. Move for automated execution?</p>
                        
                        <div class="flex gap-4">
                            <button onclick="document.getElementById('pipeline-modal').remove()" 
                                class="flex-1 px-6 py-4 rounded-xl border border-slate-700 text-slate-400 font-bold hover:bg-slate-800 transition-all">
                                Monitor Only
                            </button>
                            <button onclick="pipelineState.startPipeline(); document.getElementById('pipeline-modal').remove()" 
                                class="flex-1 px-6 py-4 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-500 shadow-xl shadow-blue-900/40 transition-all">
                                Execute Remediation
                            </button>
                        </div>
                    </div>
                `;
                document.body.appendChild(overlay);
                lucide.createIcons();
            },

            renderGlobalOverlays() {
                // Background status indicator
                let activeJob = null; // We could fetch /pipeline/status here
            },

            renderDashboard(el) {
                const s = pipelineState.metrics;
                el.innerHTML = `
                <div class="grid grid-cols-4 gap-6 mb-8">
                    <div class="glass p-8 rounded-2xl relative overflow-hidden group">
                        <div class="absolute inset-0 bg-blue-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-3 relative z-10">Total Vulnerabilities</div>
                        <div class="text-5xl font-black text-white relative z-10 tracking-tighter">${s.total}</div>
                    </div>
                    <div class="glass p-8 rounded-2xl relative overflow-hidden group border-l-4 border-l-amber-500">
                        <div class="absolute inset-0 bg-amber-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-3 relative z-10">Pending Patch</div>
                        <div class="text-5xl font-black text-amber-500 relative z-10 tracking-tighter">${s.patched}</div>
                    </div>
                    <div class="glass p-8 rounded-2xl relative overflow-hidden group border-l-4 border-l-emerald-500 shadow-[0_0_30px_rgba(52,211,153,0.1)]">
                        <div class="absolute inset-0 bg-emerald-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-3 relative z-10">Validated Secure</div>
                        <div class="text-5xl font-black text-emerald-400 relative z-10 tracking-tighter">${s.validated}</div>
                    </div>
                    <div class="glass p-8 rounded-2xl relative overflow-hidden group border-l-4 border-l-rose-500">
                        <div class="absolute inset-0 bg-rose-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                        <div class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-3 relative z-10">Total Risk Score</div>
                        <div class="text-5xl font-black text-rose-500 relative z-10 tracking-tighter">${s.risk_score}</div>
                    </div>
                </div>

                <div class="glass p-10 rounded-2xl bg-gradient-to-br from-indigo-900/40 via-blue-900/20 to-black/50 border border-blue-500/30 mb-8 shadow-2xl shadow-blue-900/20 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-96 h-96 bg-blue-500/10 blur-[100px] rounded-full pointer-events-none"></div>
                    <div class="flex justify-between items-center mb-8 relative z-10">
                        <h3 class="text-2xl font-black text-white flex items-center gap-3 tracking-tight">
                            <i data-lucide="zap" class="text-blue-400 w-6 h-6"></i> Cyber Automation Pipeline
                        </h3>
                        <div id="pipeline-mini-status" class="text-[10px] font-black px-4 py-1.5 rounded border ${pipelineState.paused ? 'border-slate-700 text-slate-400 bg-slate-900/50' : 'border-blue-500 text-blue-400 bg-blue-900/30 shadow-[0_0_15px_rgba(59,130,246,0.3)]'} uppercase tracking-widest transition-all duration-300">
                            ${pipelineState.paused ? 'IDLE' : 'EXECUTING AUTOMATION...'}
                        </div>
                    </div>
                    
                    <div id="pipeline-progress-container" class="mb-8 relative z-10">
                        <div class="flex justify-between text-[11px] font-black uppercase tracking-widest text-slate-400 mb-3">
                            <span>Remediation Progress</span>
                            <span id="pipeline-percent" class="text-blue-400">0%</span>
                        </div>
                        <div class="h-4 bg-black/60 rounded-full overflow-hidden border border-white/10 p-1 shadow-inner">
                            <div id="pipeline-progress-bar" class="h-full bg-gradient-to-r from-blue-600 to-indigo-400 rounded-full shadow-[0_0_20px_rgba(96,165,250,0.6)] transition-all duration-1000 relative overflow-hidden" style="width: 0%">
                                <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20"></div>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-4 relative z-10">
                        <div class="flex-1 relative group">
                            <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-xl blur opacity-30 group-hover:opacity-50 transition duration-500"></div>
                            <input type="text" id="web-url" placeholder="https://your-target-application.com" value="https://example.com"
                                class="w-full bg-slate-950 border border-white/10 rounded-xl px-6 py-4 text-white text-sm focus:outline-none focus:border-blue-500 relative transition-all font-mono shadow-inner shadow-black/50">
                        </div>

                `).join('');

                el.innerHTML = `
                    <div class="grid grid-cols-2 gap-8 h-[600px]">
                        <div class="glass p-10 rounded-3xl flex flex-col items-center justify-center text-center relative overflow-hidden border border-amber-500/20 shadow-[0_10px_40px_-15px_rgba(245,158,11,0.2)]">
                            <div class="absolute inset-0 bg-amber-500/5 blur-3xl rounded-full"></div>
                            <div class="text-[11px] text-slate-400 font-black uppercase tracking-[0.2em] mb-4 relative z-10">Average Security Rating</div>
                            <div class="text-9xl font-black text-amber-500 mb-6 drop-shadow-[0_0_15px_rgba(245,158,11,0.5)] relative z-10">${f.average_rating || 0}</div>
                            <div class="flex gap-2 text-3xl text-amber-500 mb-8 relative z-10">
                                ${Array(Math.round(f.average_rating || 0)).fill('★').join('')}
                            </div>
                            <div class="px-4 py-1.5 rounded-full border border-amber-500/30 bg-amber-900/20 text-[10px] tracking-widest font-black text-amber-400 uppercase relative z-10">${f.total_feedback || 0} Submissions</div>
                        </div>
                        
                        <div class="flex flex-col h-full glass rounded-3xl border border-white/5 p-8 relative overflow-hidden">
                            <h3 class="text-white font-black text-xl mb-6 tracking-tight relative z-10">Community Feedback</h3>
                            <div class="flex-1 overflow-y-auto pr-4 custom-scrollbar relative z-10">
                                ${comments || '<div class="h-full flex items-center justify-center text-slate-500 font-black uppercase tracking-[0.2em] text-[10px]">No feedback submitted yet.<br>Validate a patch to submit feedback.</div>'}
                            </div>
                        </div>
                    </div>
                `;
            },

            renderTerminal(el) {
                const logs = pipelineState.terminalLogs.map(log => {
                    let color = 'text-emerald-500';
                    const level = log.level || 'INFO';
                    const msg = log.message || '';
                    const time = log.timestamp || '';

                    if (level === 'WARNING') color = 'text-amber-400';
                    if (level === 'ERROR') color = 'text-red-500';
                    if (level === 'SUCCESS') color = 'text-blue-400';

                    return `
                        <div class="mb-1 font-mono text-xs flex gap-3 whitespace-pre-wrap">
                            <span class="text-slate-600 shrink-0 font-bold">[${time}]</span>
                            <span class="text-slate-500 uppercase shrink-0 w-16 font-bold text-[10px]">${level}</span>
                            <span class="${color}">${msg}</span>
                        </div>
                    `;
                }).join('');

                el.innerHTML = `
                    <div class="h-full flex flex-col glass rounded-3xl border border-white/10 overflow-hidden shadow-[0_20px_50px_-15px_rgba(0,0,0,0.5)]">
                        <div class="bg-black/60 backdrop-blur-xl px-6 py-4 border-b border-white/10 flex items-center justify-between shadow-md">
                            <div class="flex items-center gap-6">
                                <button onclick="app.terminalMode='scan'" class="text-[11px] font-black uppercase tracking-[0.2em] transition-all relative pb-2 ${app.terminalMode === 'scan' ? 'text-blue-400 border-b-2 border-blue-500' : 'text-slate-500 hover:text-white'}">Scanner Logic</button>
                                <button onclick="app.terminalMode='pipeline'" class="text-[11px] font-black uppercase tracking-[0.2em] transition-all relative pb-2 ${app.terminalMode === 'pipeline' ? 'text-blue-400 border-b-2 border-blue-500' : 'text-slate-500 hover:text-white'}">Automation Kernel</button>
                            </div>
                            <div class="text-[9px] text-slate-600 font-black uppercase tracking-[0.3em] flex items-center gap-2">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse block"></span> Live Shell Console
                            </div>
                        </div>
                        <div id="terminal-body" class="flex-1 p-8 overflow-y-auto custom-scrollbar font-mono bg-[#050505] inset-shadow-inner border-t border-black">
                            ${app.terminalMode === 'scan' ? (logs || '<div class="text-slate-700 animate-pulse font-bold tracking-widest">_ Initialize scanner module...</div>') :
                        (pipelineState.pipelineLogs.map(l => `<div class="mb-2 font-mono text-[11px] flex gap-3 leading-relaxed"><span class="text-slate-600 font-bold shrink-0">[${l.timestamp}]</span> <span class="${l.level === 'SUCCESS' ? 'text-blue-400 font-bold' : l.level === 'ERROR' ? 'text-rose-500 font-bold' : l.level === 'WARNING' ? 'text-amber-500 font-bold' : 'text-slate-400'}">${l.message}</span></div>`).join('') || '<div class="text-slate-700 animate-pulse font-bold tracking-widest">_ Awaiting pipeline directives...</div>')}
                        </div>
                    </div>
                `;

                // Auto scroll
                const term = document.getElementById('terminal-body');
                if (term) term.scrollTop = term.scrollHeight;
            },

            renderWebsiteScanner(el) {
                const sites = pipelineState.availableWebsites.map(s => `
                    <div class="glass p-6 rounded-xl border border-slate-800 hover:border-blue-500/50 transition-all flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-3 mb-3">
                                <div class="w-10 h-10 rounded-lg bg-blue-600/20 flex items-center justify-center text-blue-500">
                                    <i data-lucide="globe" class="w-5 h-5"></i>
                                </div>
                                <h4 class="text-white font-bold leading-tight text-sm">${s.name}</h4>
                            </div>
                            <div class="bg-slate-900/50 rounded-lg p-3 mb-4 border border-slate-800">
                                <div class="text-[9px] text-slate-600 uppercase font-bold mb-1">Target URL</div>
                                <div class="flex items-center gap-2">
                                    <input type="text" value="${s.url}" readonly 
                                        class="flex-1 bg-transparent text-[11px] font-mono text-blue-400 outline-none select-all cursor-pointer" 
                                        onclick="this.select()" 
                                        title="Click to select and copy"/>
                                    <button onclick="navigator.clipboard.writeText('${s.url}'); this.innerHTML='✓'; setTimeout(() => this.innerHTML='📋', 1000)" 
                                        class="text-slate-500 hover:text-blue-400 text-xs transition-all" 
                                        title="Copy URL">📋</button>
                                </div>
                            </div>
                        </div>
                        <button onclick="pipelineState.scanPredefinedWebsite('${s.id}')"
                            class="w-full bg-slate-800 hover:bg-blue-600 text-white font-bold py-2.5 rounded-lg text-xs transition-all flex items-center justify-center gap-2">
                            <i data-lucide="zap" class="w-3 h-3"></i> Initialize Audit
                        </button>
                    </div>
                `).join('');

                el.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h3 class="text-2xl font-black text-white tracking-tight">Application Target Registry</h3>
                            <p class="text-slate-400 text-xs mt-1">Select a pre-connected test environment or supply a custom endpoint URL.</p>
                        </div>
                        <button onclick="pipelineState.executiveScan()" 
                            class="bg-gradient-to-br from-rose-600 to-rose-800 hover:from-rose-500 hover:to-rose-700 text-white font-black uppercase tracking-widest px-8 py-4 rounded-2xl shadow-[0_10px_30px_rgba(244,63,94,0.3)] hover:shadow-[0_15px_40px_rgba(244,63,94,0.4)] hover:-translate-y-1 flex items-center gap-3 transition-all duration-300">
                            <i data-lucide="shield-alert" class="w-5 h-5"></i> INITIATE EXECUTIVE OVERRIDE (ALL)
                        </button>
                    </div>
                    
                    <div class="glass p-8 rounded-3xl border border-blue-500/30 bg-gradient-to-br from-blue-900/20 to-indigo-900/10 mb-10 shadow-xl relative overflow-hidden">
                        <div class="absolute right-0 top-0 w-96 h-96 bg-blue-500/10 blur-[100px] rounded-full pointer-events-none"></div>
                        <h3 class="text-xl font-black text-white mb-2 tracking-tight relative z-10">Scan Custom Environment</h3>
                        <p class="text-slate-400 text-xs mb-6 relative z-10 max-w-2xl text-balance">Supply a public HTTP/HTTPS URL target to engage the structural deep-scan heuristic engine across backend endpoints.</p>
                        <div class="flex gap-4 relative z-10 group">
                            <div class="flex-1 flex items-center bg-slate-950/80 border border-white/10 rounded-2xl px-6 focus-within:border-blue-500 transition-all shadow-inner shadow-black/50 group-hover:border-white/20">
                                <i data-lucide="target" class="w-5 h-5 text-slate-500 mr-3"></i>
                                <input type="url" id="custom-url-input-registry" placeholder="https://your-public-target.com" class="bg-transparent text-sm font-mono text-white w-full py-4 outline-none focus:ring-0">
                            </div>
                            <button onclick="pipelineState.scanWebsite(document.getElementById('custom-url-input-registry').value)" class="bg-gradient-to-b from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 text-white font-black tracking-widest px-10 py-4 rounded-2xl shadow-[0_10px_30px_rgba(59,130,246,0.3)] hover:shadow-[0_15px_40px_rgba(59,130,246,0.4)] flex items-center gap-3 transition-all duration-300 shrink-0 hover:-translate-y-1">
                                <i data-lucide="radar" class="w-4 h-4"></i> EXECUTE PENETRATION
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-4 gap-6">
                        ${sites || '<div class="col-span-4 text-center py-20 text-slate-500 font-black tracking-[0.2em] text-[10px] uppercase">Awaiting Registry Sync...</div>'}
                    </div>
                `;
                lucide.createIcons();
            }
        };

        window.onload = () => app.init();
    </script>
</body>

</html>
